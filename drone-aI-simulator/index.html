<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyDrop | Modern AI Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f0f9ff; color: #1e293b; overflow-x: hidden; }
        
        /* Light Theme Glassmorphism */
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05); }

        /* Drone Propeller Animation */
        .rotor { width: 50px; height: 6px; background: #334155; border-radius: 10px; position: absolute; animation: spin 0.1s linear infinite; animation-play-state: paused; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* Flight States */
        .hover-float { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        
        .takeoff-anim { animation: flyUp 3s forwards cubic-bezier(.47,0,.74,.71); }
        @keyframes flyUp { 
            0% { transform: translateY(0) scale(1); opacity: 1; }
            30% { transform: translateY(-30px) scale(1.1); }
            100% { transform: translateY(-800px) scale(0.2); opacity: 0; }
        }

        .status-pill { transition: all 0.3s ease; }
        .active-pulse { animation: pulse-green 2s infinite; }
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
    </style>
</head>
<body>

    <div id="startup-screen" class="fixed inset-0 z-[100] bg-white flex flex-col items-center justify-center transition-all duration-700">
        <div class="text-center">
            <div class="mb-6 inline-block p-5 bg-blue-100 rounded-full">
                <i class="fas fa-paper-plane text-4xl text-blue-600"></i>
            </div>
            <h2 class="text-3xl font-extrabold text-slate-800 mb-2">SkyDrop AI</h2>
            <p class="text-slate-500 mb-8">Ready to synchronize with drone fleet</p>
            <button onclick="bootSystem()" class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-4 rounded-2xl font-bold shadow-xl shadow-blue-200 transition-all active:scale-95">
                Initialize Fleet
            </button>
        </div>
    </div>

    <nav class="p-6 flex justify-between items-center max-w-7xl mx-auto">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-200">
                <i class="fas fa-box-open text-white text-xl"></i>
            </div>
            <span class="text-2xl font-800 tracking-tight text-slate-800">SkyDrop</span>
        </div>
        <div class="flex gap-4 items-center">
            <div id="weather-pill" class="bg-white px-4 py-2 rounded-full border border-slate-100 flex items-center gap-3 shadow-sm">
                <i class="fas fa-cloud-sun text-yellow-500"></i>
                <span id="wind-text" class="text-sm font-semibold text-slate-600">Checking Sky...</span>
            </div>
            <img src="https://ui-avatars.com/api/?name=Admin&background=0284c7&color=fff" class="w-10 h-10 rounded-full border-2 border-white shadow-md">
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 grid lg:grid-cols-12 gap-6 h-[calc(100vh-140px)]">
        
        <div class="lg:col-span-3 space-y-6">
            <div class="glass-panel p-6 rounded-[2.5rem] h-full flex flex-col">
                <h3 class="text-lg font-bold mb-6 flex items-center gap-2">
                    <i class="fas fa-layer-group text-blue-500"></i>
                    Delivery Type
                </h3>
                
                <div class="space-y-4 flex-1">
                    <div onclick="prepLaunch('Medical Gear', 'fa-kit-medical', 'red')" class="p-4 rounded-2xl border-2 border-transparent bg-slate-50 hover:border-red-400 cursor-pointer transition-all group">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-red-100 rounded-xl flex items-center justify-center text-red-600 group-hover:scale-110 transition">
                                <i class="fas fa-kit-medical text-xl"></i>
                            </div>
                            <div>
                                <p class="font-bold text-slate-800">Medical</p>
                                <p class="text-xs text-slate-500">Emergency Kit</p>
                            </div>
                        </div>
                    </div>

                    <div onclick="prepLaunch('Hot Meal', 'fa-burger', 'orange')" class="p-4 rounded-2xl border-2 border-transparent bg-slate-50 hover:border-orange-400 cursor-pointer transition-all group">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-orange-100 rounded-xl flex items-center justify-center text-orange-600 group-hover:scale-110 transition">
                                <i class="fas fa-burger text-xl"></i>
                            </div>
                            <div>
                                <p class="font-bold text-slate-800">Food</p>
                                <p class="text-xs text-slate-500">Restaraunt Order</p>
                            </div>
                        </div>
                    </div>

                    <div onclick="prepLaunch('Electronics', 'fa-microchip', 'blue')" class="p-4 rounded-2xl border-2 border-transparent bg-slate-50 hover:border-blue-400 cursor-pointer transition-all group">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center text-blue-600 group-hover:scale-110 transition">
                                <i class="fas fa-microchip text-xl"></i>
                            </div>
                            <div>
                                <p class="font-bold text-slate-800">Tech</p>
                                <p class="text-xs text-slate-500">Priority Parts</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mt-6 p-4 bg-blue-50 rounded-2xl">
                    <p class="text-[10px] uppercase font-bold text-blue-400 mb-1">Target GPS</p>
                    <p id="gps-display" class="text-sm font-bold text-slate-700 tracking-tight">Detecting Location...</p>
                </div>
            </div>
        </div>

        <div class="lg:col-span-6 relative">
            <div class="glass-panel rounded-[3rem] h-full w-full overflow-hidden flex flex-col items-center justify-center relative">
                
                <div class="absolute inset-0 opacity-10" style="background-image: radial-gradient(#3b82f6 1px, transparent 1px); background-size: 30px 30px;"></div>
                
                <div id="drone-unit" class="relative z-10 flex flex-col items-center hover-float">
                    <img id="drone-img" src="https://pngimg.com/d/drone_PNG204.png" class="w-72 drop-shadow-2xl transition-all duration-500" alt="Drone View">
                    
                    <div class="absolute inset-0 flex flex-wrap justify-between p-4 pointer-events-none">
                        <div class="rotor" style="top: 15%; left: 15%;"></div>
                        <div class="rotor" style="top: 15%; right: 15%;"></div>
                        <div class="rotor" style="bottom: 15%; left: 15%;"></div>
                        <div class="rotor" style="bottom: 15%; right: 15%;"></div>
                    </div>
                </div>

                <div class="absolute bottom-8 left-8 right-8 flex gap-4">
                    <div class="flex-1 bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                        <p class="text-[10px] uppercase font-bold text-slate-400">Altitude</p>
                        <p id="alt-meter" class="text-2xl font-bold text-slate-800">0<span class="text-sm text-slate-400 ml-1">m</span></p>
                    </div>
                    <div class="flex-1 bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                        <p class="text-[10px] uppercase font-bold text-slate-400">AI Battery</p>
                        <p class="text-2xl font-bold text-green-500">100<span class="text-sm text-slate-400 ml-1">%</span></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-3 space-y-4 flex flex-col">
            <div class="glass-panel p-6 rounded-[2.5rem] flex-1 overflow-hidden flex flex-col">
                <h3 class="text-sm font-bold uppercase tracking-widest text-slate-400 mb-4">Mission Logs</h3>
                <div id="log-box" class="flex-1 overflow-y-auto space-y-3 pr-2 text-xs font-medium text-slate-600">
                    <div class="p-2 border-l-2 border-blue-400 bg-blue-50 rounded-r-lg">System initialized. Awaiting input.</div>
                </div>
            </div>

            <button id="btn-launch" disabled onclick="startDroneMission()" class="w-full py-6 rounded-[2rem] bg-slate-200 text-slate-500 font-extrabold text-xl shadow-lg transition-all cursor-not-allowed">
                SYSTEM LOCKED
            </button>
        </div>
    </main>

    <script>
        let weatherOk = false;
        let uLat, uLng;

        function bootSystem() {
            document.getElementById('startup-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('startup-screen').style.display = 'none';
                fetchWeather();
                getGPS();
            }, 700);
        }

        function getGPS() {
            navigator.geolocation.getCurrentPosition(p => {
                uLat = p.coords.latitude;
                uLng = p.coords.longitude;
                document.getElementById('gps-display').innerText = `${uLat.toFixed(4)}, ${uLng.toFixed(4)}`;
                addLog(`GPS lock established via AI satellite.`);
            });
        }

        async function fetchWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=37.77&longitude=-122.41&current_weather=true');
                const data = await res.json();
                const wind = data.current_weather.windspeed;
                document.getElementById('wind-text').innerText = `Wind: ${wind} km/h`;
                
                if(wind < 35) {
                    weatherOk = true;
                    addLog(`Weather check: Clear for takeoff (${wind}km/h).`);
                } else {
                    addLog(`Alert: High winds detected. Safety lock active.`);
                }
            } catch(e) {
                weatherOk = true; // Fallback
            }
        }

        function prepLaunch(type, icon, color) {
            addLog(`Payload Assigned: ${type}`);
            const btn = document.getElementById('btn-launch');
            if(weatherOk) {
                btn.disabled = false;
                btn.innerText = "START DELIVERY";
                btn.classList.replace('bg-slate-200', 'bg-blue-600');
                btn.classList.replace('text-slate-500', 'text-white');
                btn.classList.replace('cursor-not-allowed', 'active-pulse');
            }
        }

        function startDroneMission() {
            addLog("AI calculating optimized flight path...");
            document.getElementById('btn-launch').innerText = "FLYING...";
            document.getElementById('btn-launch').disabled = true;

            // Start Propellers
            document.querySelectorAll('.rotor').forEach(r => r.style.animationPlayState = 'running');

            // Simulate Altitude Change
            let alt = 0;
            const altTimer = setInterval(() => {
                alt += 5;
                document.getElementById('alt-meter').innerHTML = `${alt}<span class="text-sm text-slate-400 ml-1">m</span>`;
                if(alt >= 120) {
                    clearInterval(altTimer);
                    addLog("Altitude reached. Engaging AI cruise mode.");
                    
                    // Trigger Departure Animation
                    setTimeout(() => {
                        document.getElementById('drone-unit').classList.remove('hover-float');
                        document.getElementById('drone-unit').classList.add('takeoff-anim');
                        addLog("Drone en-route to customer.");
                    }, 1000);
                }
            }, 50);
        }

        function addLog(msg) {
            const lb = document.getElementById('log-box');
            const d = document.createElement('div');
            d.className = "p-3 bg-white border border-slate-100 rounded-xl mb-2 shadow-sm animate-fade-in";
            d.innerHTML = `<span class="text-blue-500 font-bold mr-2">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span> ${msg}`;
            lb.prepend(d);
        }
    </script>
</body>
</html>
