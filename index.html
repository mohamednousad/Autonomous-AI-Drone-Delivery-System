<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Short Content Generator</title>
<style>
body { font-family: Arial, sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
.container { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; width: 100%; }
input, button { width: 100%; padding: 10px; margin: 10px 0; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; }
button { background: #007BFF; color: #fff; border: none; cursor: pointer; }
button:hover { background: #0056b3; }
.result { margin-top: 20px; }
</style>
</head>
<body>
<div class="container">
    <h2>Short Content Generator</h2>
    <input type="text" id="topic" placeholder="Enter a topic">
    <button onclick="generateContent()">Generate</button>
    <div class="result" id="result"></div>
</div>

<script>
async function generateContent() {
    const topic = document.getElementById("topic").value.trim();
    const resultDiv = document.getElementById("result");
    if(!topic) { resultDiv.innerHTML = "Please enter a topic!"; return; }

    resultDiv.innerHTML = "Generating...";

    try {
        const response = await fetch("https://unstatic-nonpendently-lola.ngrok-free.dev/generate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ topic })
        });
        const data = await response.json();
        if(data.error) {
            resultDiv.innerHTML = data.error;
        } else {
            resultDiv.innerHTML = `<strong>Paragraph:</strong> ${data.paragraph}<br><strong>Slogan:</strong> ${data.slogan}`;
        }
    } catch (err) {
        resultDiv.innerHTML = "Error connecting to the server.";
    }
}
</script>
</body>
</html>
