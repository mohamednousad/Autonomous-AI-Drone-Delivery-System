<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal AI | Biological Synthesis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes pulse-border {
            0% { border-color: rgba(59, 130, 246, 0.5); }
            50% { border-color: rgba(59, 130, 246, 1); }
            100% { border-color: rgba(59, 130, 246, 0.5); }
        }
        .ai-card { animation: pulse-border 3s infinite; }
    </style>
</head>
<body class="bg-black text-slate-200 min-h-screen selection:bg-blue-500/30">

    <div class="max-w-4xl mx-auto px-6 py-12">
        <header class="text-center mb-12">
            <div class="inline-block p-3 rounded-full bg-blue-900/20 border border-blue-500/30 mb-4">
                <i class="fas fa-dna text-3xl text-blue-400"></i>
            </div>
            <h1 class="text-5xl font-black tracking-tighter text-white mb-2">NOUSAD<span class="text-blue-500">AI</span></h1>
            <p class="text-slate-500 font-mono text-sm tracking-widest uppercase">Wikipedia-Fed Biological Synthesis Engine</p>
        </header>

        <div class="bg-slate-900/50 border border-slate-800 rounded-3xl p-8 backdrop-blur-xl shadow-2xl">
            <div class="flex flex-col md:flex-row gap-4 mb-8">
                <input type="text" id="animalInput" placeholder="Enter Animal Name (e.g. Snow Leopard, Blue Whale)" 
                    class="flex-1 bg-black border border-slate-700 rounded-2xl px-6 py-4 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all font-medium">
                <button onclick="synthesizeData()" id="genBtn" 
                    class="bg-blue-600 hover:bg-blue-500 text-white font-bold px-8 py-4 rounded-2xl transition-all flex items-center justify-center gap-2 active:scale-95">
                    <span>Genarate</span>
                    <i class="fas fa-atom animate-spin hidden" id="spinner"></i>
                </button>
            </div>

            <div id="resultBox" class="hidden space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-black/40 p-4 rounded-2xl border border-slate-800">
                        <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Lexical Density</p>
                        <p id="metricVal" class="text-2xl font-mono text-blue-400">0.0000</p>
                    </div>
                    <div class="bg-black/40 p-4 rounded-2xl border border-slate-800">
                        <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Data Origin</p>
                        <p id="sourceVal" class="text-sm font-bold text-slate-300">WIKI-VECTOR-v1</p>
                    </div>
                    <div class="bg-black/40 p-4 rounded-2xl border border-slate-800">
                        <p class="text-[10px] text-slate-500 uppercase font-bold mb-1">Synthesis Result</p>
                        <p class="text-green-500 text-sm font-bold">● OPTIMAL</p>
                    </div>
                </div>

                <div class="ai-card bg-blue-500/5 border border-blue-500/20 p-8 rounded-3xl">
                    <h2 id="sloganText" class="text-blue-400 font-black text-xl mb-4 italic uppercase tracking-tight text-center"></h2>
                    <p id="paragraphText" class="text-lg leading-relaxed text-slate-300 font-light first-letter:text-4xl first-letter:font-bold first-letter:text-blue-500"></p>
                </div>
            </div>
            
            <div id="errorBox" class="hidden p-4 bg-red-900/20 border border-red-500/50 rounded-2xl text-red-400 text-center font-mono text-sm"></div>
        </div>
        
        <footer class="mt-8 text-center text-slate-600 text-[10px] font-mono tracking-widest uppercase">
            Neural Architecture: TF-IDF Linguistic Processing
        </footer>
    </div>

    <script>
        const API_URL = "https://unstatic-nonpendently-lola.ngrok-free.dev/generate"; // REPLACE WITH THE URL FROM COLAB

        async function synthesizeData() {
            const topic = document.getElementById('animalInput').value;
            const btn = document.getElementById('genBtn');
            const spinner = document.getElementById('spinner');
            const resultBox = document.getElementById('resultBox');
            const errorBox = document.getElementById('errorBox');

            if (!topic) return;

            // UI Reset
            btn.disabled = true;
            spinner.classList.remove('hidden');
            errorBox.classList.add('hidden');
            resultBox.classList.add('hidden');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic: topic })
                });

                const data = await response.json();

                if (data.status === "success") {
                    document.getElementById('paragraphText').innerText = data.ai_generated_paragraph;
                    document.getElementById('sloganText').innerText = data.slogan;
                    document.getElementById('metricVal').innerText = data.intelligence_metrics.lexical_density;
                    document.getElementById('sourceVal').innerText = data.intelligence_metrics.data_source;
                    resultBox.classList.remove('hidden');
                } else {
                    throw new Error(data.message || "Synthesis failed");
                }
            } catch (err) {
                errorBox.innerText = `SYSTEM ERROR: ${err.message}`;
                errorBox.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                spinner.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
