<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Drone Dispatch | Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <div class="container mx-auto px-4 py-10">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-bold text-blue-400 mb-2 tracking-tight">
                <i class="fas fa-drone-alt mr-3"></i>Autonomous Flight Dispatch
            </h1>
            <p class="text-slate-400">Advanced AI Decision-Making Simulation System</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
                <h2 class="text-xl font-semibold mb-6 flex items-center">
                    <i class="fas fa-sliders-h mr-2 text-blue-400"></i> Mission Parameters
                </h2>
                <form id="dispatchForm" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-medium text-slate-500 uppercase mb-1">Latitude</label>
                            <input type="number" step="any" name="lat" value="40.7128" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-500 uppercase mb-1">Longitude</label>
                            <input type="number" step="any" name="lon" value="-74.0060" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-medium text-slate-500 uppercase mb-1">Distance (km)</label>
                            <input type="number" name="distance" value="8.5" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-500 uppercase mb-1">Battery (%)</label>
                            <input type="number" name="battery" value="100" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3">
                        </div>
                    </div>

                    <hr class="border-slate-700 my-4">

                    <div class="grid grid-cols-3 gap-4">
                        <div>
                            <label class="block text-xs font-medium text-slate-500 uppercase mb-1">Temp (°C)</label>
                            <input type="number" name="temp" value="25" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-500 uppercase mb-1">Wind (km/h)</label>
                            <input type="number" name="wind_speed" value="12" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3">
                        </div>
                        <div>
                            <label class="block text-xs font-medium text-slate-500 uppercase mb-1">Rain (%)</label>
                            <input type="number" name="rain_prob" value="5" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3">
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition duration-200 transform hover:scale-[1.02] shadow-lg flex justify-center items-center">
                        <span id="btnText">ANALYZE MISSION</span>
                        <div id="loader" class="hidden animate-spin rounded-full h-5 w-5 border-b-2 border-white ml-3"></div>
                    </button>
                </form>
            </div>

            <div id="resultCard" class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 flex flex-col justify-center transition-all duration-500 opacity-50">
                <div id="placeholder" class="text-center py-20">
                    <i class="fas fa-microchip text-6xl text-slate-700 mb-4"></i>
                    <p class="text-slate-500">Awaiting input data for real-time processing...</p>
                </div>

                <div id="content" class="hidden">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <h2 class="text-slate-400 uppercase text-xs font-bold tracking-widest">AI DECISION</h2>
                            <div id="decisionText" class="text-5xl font-black mt-2">---</div>
                        </div>
                        <div class="text-right">
                            <h2 class="text-slate-400 uppercase text-xs font-bold tracking-widest">RISK SCORE</h2>
                            <div id="riskScore" class="text-4xl font-mono text-blue-400 mt-2">0.00</div>
                        </div>
                    </div>

                    <div class="bg-slate-900/50 p-6 rounded-xl border border-slate-700 mb-6">
                        <h3 class="text-sm font-semibold text-blue-400 mb-2 uppercase tracking-wide">System Explanation:</h3>
                        <p id="explanation" class="text-slate-300 italic text-lg leading-relaxed font-light">
                            Waiting for model inference...
                        </p>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-slate-900 p-4 rounded-lg text-center border border-slate-700">
                            <span class="block text-slate-500 text-[10px] uppercase">Telemetry Status</span>
                            <span class="text-green-500 text-sm font-bold">● ACTIVE</span>
                        </div>
                        <div class="bg-slate-900 p-4 rounded-lg text-center border border-slate-700">
                            <span class="block text-slate-500 text-[10px] uppercase">Model Version</span>
                            <span class="text-slate-300 text-sm font-bold font-mono">HYBRID-v3.2</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://unstatic-nonpendently-lola.ngrok-free.dev/decide";
        const form = document.getElementById('dispatchForm');
        const submitBtn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const resultCard = document.getElementById('resultCard');
        const placeholder = document.getElementById('placeholder');
        const content = document.getElementById('content');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // UI Feedback
            submitBtn.disabled = true;
            loader.classList.remove('hidden');
            resultCard.classList.add('opacity-100');
            
            const formData = new FormData(form);
            const payload = Object.fromEntries(formData.entries());
            
            // Convert strings to numbers
            for (let key in payload) payload[key] = parseFloat(payload[key]);

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                // Reveal Output
                placeholder.classList.add('hidden');
                content.classList.remove('hidden');
                
                document.getElementById('decisionText').innerText = data.decision;
                document.getElementById('riskScore').innerText = data.risk_score;
                document.getElementById('explanation').innerText = `"${data.explanation}"`;

                // Visual Logic based on decision
                resultCard.className = "bg-slate-800 p-8 rounded-2xl shadow-2xl border-2 transition-all duration-500";
                const dText = document.getElementById('decisionText');
                
                if (data.decision === "PROCEED") {
                    resultCard.classList.add('border-green-500/50', 'shadow-green-900/20');
                    dText.className = "text-5xl font-black mt-2 text-green-500";
                } else if (data.decision === "DELAY" || data.decision === "REROUTE") {
                    resultCard.classList.add('border-yellow-500/50', 'shadow-yellow-900/20');
                    dText.className = "text-5xl font-black mt-2 text-yellow-500";
                } else {
                    resultCard.classList.add('border-red-500/50', 'shadow-red-900/20');
                    dText.className = "text-5xl font-black mt-2 text-red-500";
                }

            } catch (error) {
                alert("Error connecting to AI Server. Check if Ngrok is running.");
                console.error(error);
            } finally {
                submitBtn.disabled = false;
                loader.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
